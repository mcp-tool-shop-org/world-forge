name: CI

on:
  push:
    paths:
      - 'packages/**'
      - 'site/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'packages/**'
      - 'site/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # INF-B-006: cap wall time so a runaway test / infinite loop can't drain the
    # 6-hour GitHub default. Current green runs finish in ~3 min; 20 is a comfy
    # ceiling.
    timeout-minutes: 20
    strategy:
      matrix:
        # Supported LTS lines only: 22 = Maintenance LTS, 24 = Active LTS.
        # Node 20 "Iron" reached end-of-life 2026-04-30 and was dropped.
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      # INF-B-004: Coverage runs every matrix leg so artifacts are uploaded
      # unconditionally, not gated to a single Node version. Codecov upload is
      # single-leg (Node 24, the Active LTS) to avoid double-reporting coverage.
      - name: Coverage
        run: npx vitest run --coverage
      # INF-B-004: Upload coverage artifacts every run (not just the Codecov leg)
      # so failing runs on older Node versions still yield debuggable artifacts.
      # Vitest does not produce a separate "test output" directory by default —
      # only the coverage/ directory is authoritative, so that's what we upload.
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: ignore
      # Coverage upload uses continue-on-error because Codecov availability
      # should never block CI — the token may be missing in forks or the
      # Codecov service may be temporarily unreachable.
      - name: Upload coverage to Codecov
        if: matrix.node-version == 24
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # INF-B-010: Type-check and build the Starlight handbook on site/** changes.
  # Keeps handbook drift (e.g. stale Package Map) from landing silently.
  # Kept intentionally minimal — only Node 24, single job, ~30s runtime target.
  site-build:
    runs-on: ubuntu-latest
    # INF-B-006: same budget cap as build-and-test. Handbook build is ~30s today.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install site deps
        working-directory: site
        run: npm ci
      - name: Build handbook
        working-directory: site
        run: npm run build
