name: CI

on:
  push:
    paths:
      - 'packages/**'
      - 'site/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'packages/**'
      - 'site/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # INF-B-006: cap wall time so a runaway test / infinite loop can't drain the
    # 6-hour GitHub default. Current green runs finish in ~3 min; 20 is a comfy
    # ceiling.
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      # INF-B-004: Coverage runs every matrix leg so artifacts are uploaded
      # unconditionally, not gated to a single Node version. Codecov upload is
      # still Node-22-only to avoid double-reporting the same coverage.
      - name: Coverage
        run: npx vitest run --coverage
      # INF-B-004: Upload coverage artifacts every run (not just the Codecov leg)
      # so failing runs on older Node versions still yield debuggable artifacts.
      # Vitest does not produce a separate "test output" directory by default —
      # only the coverage/ directory is authoritative, so that's what we upload.
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: ignore
      # Coverage upload uses continue-on-error because Codecov availability
      # should never block CI — the token may be missing in forks or the
      # Codecov service may be temporarily unreachable.
      - name: Upload coverage to Codecov
        if: matrix.node-version == 22
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # INF-B-010: Type-check and build the Starlight handbook on site/** changes.
  # Keeps handbook drift (e.g. stale Package Map) from landing silently.
  # Kept intentionally minimal — only Node 22, single job, ~30s runtime target.
  site-build:
    runs-on: ubuntu-latest
    # INF-B-006: same budget cap as build-and-test. Handbook build is ~30s today.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install site deps
        working-directory: site
        run: npm ci
      - name: Build handbook
        working-directory: site
        run: npm run build
