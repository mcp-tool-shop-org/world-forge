name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # INF-B-006: cap wall time so a hung build can't burn the 6-hour default.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # INF-B-006: deploy is normally <1 min; 20 minutes leaves generous headroom.
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      # INF-B-009: Pages reports success the moment the artifact is wired up,
      # but occasionally the CDN lags or a redirect misfires and the site goes
      # stale silently. Curl the deployed URL and fail the job on non-200.
      # Retries 5x with backoff because CDN propagation can take a few seconds.
      - name: Verify deployed site returns 200
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          if [ -z "$url" ]; then
            echo "::error::deploy-pages did not emit a page_url output"
            exit 1
          fi
          echo "Probing $url"
          for attempt in 1 2 3 4 5; do
            status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$url" || echo "000")
            echo "attempt $attempt: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "::notice::Pages deploy verified ($url returned 200)"
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "::error::Pages deploy verification failed — $url never returned 200"
          exit 1
